<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f0f0f0;
            text-align: center;
        }

        .card {
            background: white;
            width: 300px;
            margin: 50px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        img {
            width: 100px;
            border-radius: 50%;
        }

        button {
            padding: 10px;
            border: none;
            background: blue;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: darkblue;
        }
    </style>
</head>

<body>

<div class="card">
    <img src="https://via.placeholder.com/100" alt="Profile">
    <h2>Srinivas</h2>
    <p>DevOps Engineer | AWS | Docker</p>

    <button onclick="showMessage()">Click Me</button>
</div>

<script>
    function showMessage() {
        alert("Welcome to my profile!");
    }
</script>

</body>
</html>
